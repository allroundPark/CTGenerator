<!DOCTYPE html>
<html lang="ko" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Day — Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <style>
    .hero-quote, .hero-sub {
  white-space: pre-line;
}
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { interpolate-size: allow-keywords; --font-scale: 1; }

    html.theme-dark {
      --bg: #1A1816; --surface: #242220; --surface-hover: #2E2C2A;
      --border: rgba(232,226,217,0.16);
      --text: #E8E2D9; --text-secondary: #8C8680;
      --accent: #5B6CF8; --accent-secondary: #D4A843;
      --positive: #3D9970; --negative: #D95F5F; --warning: #D4A843;
    }
    html.theme-light {
      --bg: #F5F2ED; --surface: #FFFFFF; --surface-hover: #EDEAE3;
      --border: rgba(26,24,22,0.18);
      --text: #1A1816; --text-secondary: #6B6560;
      --accent: #4A5AE8; --accent-secondary: #B8912E;
      --positive: #2E7D55; --negative: #B84848; --warning: #B8912E;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Pretendard Variable', Pretendard, 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      display: flex; justify-content: center; align-items: center;
      transition: background-color 0.35s ease, background-image 0.35s ease;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
    }
    h1,h2,h3,h4,h5,h6 { color: var(--text); letter-spacing: -0.02em; line-height: 1.15; text-wrap: balance; }
    h1 { font-weight: 700; }
    h2 { font-weight: 700; }
    h3 { font-weight: 600; }
    p, li, span, label { color: var(--text); font-weight: 400; }
    .text-secondary { color: var(--text-secondary); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .animate { animation: fadeInUp 0.6s ease-out both; }
    .animate.delay-1 { animation-delay: 0.1s; }
    .animate.delay-2 { animation-delay: 0.2s; }
    .animate.delay-3 { animation-delay: 0.3s; }
    .animate.delay-4 { animation-delay: 0.4s; }
    .animate.delay-5 { animation-delay: 0.5s; }
    .animate.delay-6 { animation-delay: 0.6s; }
    .animate.delay-7 { animation-delay: 0.7s; }
    .animate.delay-8 { animation-delay: 0.8s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* ===== PDF 모드 (body.pdf-mode 활성 시) ===== */
    body.pdf-mode {
      display: block !important;
      overflow: visible !important;
      height: auto !important;
      background: #FAFAF9 !important;
    }
    body.pdf-mode .viz-menu,
    body.pdf-mode .slide-nav,
    body.pdf-mode .progress-bar { display: none !important; }

    body.pdf-mode .slides-wrapper {
      position: static !important;
      width: 1920px !important;
      height: auto !important;
      transform: none !important;
      overflow: visible !important;
      background: transparent !important;
    }
    body.pdf-mode .slide {
      position: relative !important;
      inset: auto !important;
      opacity: 1 !important;
      transform: none !important;
      pointer-events: auto !important;
      width: 1920px !important;
      height: 1080px !important;
      overflow: hidden !important;
      transition: none !important;
      background: var(--bg) !important;
    }
    body.pdf-mode .slide-image-only {
      padding: 60px 80px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    body.pdf-mode .slide-image-only img {
      max-width: calc(1920px - 160px) !important;
      max-height: calc(1080px - 120px) !important;
      width: auto !important;
      height: auto !important;
      object-fit: contain !important;
    }
    body.pdf-mode .slide.exit-left {
      display: flex !important; opacity: 1 !important; transform: none !important;
    }
    body.pdf-mode .animate {
      animation: none !important; opacity: 1 !important; transform: none !important;
    }
    /* 멀티스텝: 모든 기능 스텝을 표시 */
    body.pdf-mode .built-feature-step { display: flex !important; flex-direction: row !important; align-items: baseline !important; gap: 8px !important; margin-bottom: 6px !important; }
    body.pdf-mode .built-feature-step.built-intro-step { display: none !important; }
    body.pdf-mode .built-feature-step h3 { margin-bottom: 0 !important; white-space: nowrap !important; }
    body.pdf-mode .built-feature-step p { margin-bottom: 0 !important; white-space: nowrap !important; }
    /* 비디오/미디어 영역 숨기고, 텍스트 영역이 전체 너비 사용 */
    body.pdf-mode video { display: none !important; }
    body.pdf-mode .step-media-wrap { display: none !important; }
    /* feature-image variant: 이미지 숨기고 텍스트만 표시 */
    body.pdf-mode .built-feature-step img { display: none !important; }
    body.pdf-mode .slide-built[data-multistep] {
      flex-direction: column !important;
      align-items: flex-start !important;
    }
    body.pdf-mode .slide-built[data-multistep] > div:first-child {
      flex: 1 1 auto !important;
      width: 100% !important;
      max-width: 100% !important;
    }

    @media print {
      @page { size: 297mm 167.06mm; margin: 0; }
      html, body { margin: 0 !important; padding: 0 !important; }
      .viz-menu, .slide-nav, .progress-bar { display: none !important; }

      body.pdf-mode .slides-wrapper {
        width: 1920px !important;
        zoom: 0.585 !important;
      }
      body.pdf-mode .slide {
        page-break-after: always !important;
        break-after: page !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      body.pdf-mode .slide:last-child {
        page-break-after: auto !important;
        break-after: auto !important;
      }

      /* 페이지 번호 */
      .pdf-page-number {
        display: block !important;
        position: absolute !important;
        bottom: 24px !important;
        right: 40px !important;
        font-size: 20px !important;
        font-family: 'Inter', sans-serif !important;
        color: var(--text-secondary) !important;
        opacity: 0.6 !important;
        z-index: 10 !important;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
    }

    /* ===== MENU ===== */
    .viz-menu { position: fixed; top: 16px; right: 16px; z-index: 9999; }
    .viz-menu-toggle {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(20,20,20,0.6); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      backdrop-filter: blur(12px); transition: all 0.2s;
    }
    .theme-light .viz-menu-toggle { background: rgba(255,255,255,0.7); }
    .theme-light .problem-card,
    .theme-light .feature-card,
    .theme-light .next-card,
    .theme-light .extra-card,
    .theme-light .ba-col,
    .theme-light .whatsnext-card,
    .theme-light .common-compare-col,
    .theme-light .common-vlist-item,
    .theme-light .reality-item,
    .theme-light .problem-focus-card,
    .theme-light .problem-single-point {
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .theme-light .whatsnext-right-card,
    .theme-light .whatsnext-next-item {
      box-shadow: none;
    }
    .viz-menu-toggle:hover { background: var(--surface-hover); }
    .viz-menu-dropdown {
      position: absolute; top: 48px; right: 0; min-width: 180px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px;
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: all 0.2s; backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .viz-menu-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .viz-menu-dropdown button {
      width: 100%; padding: 8px 12px; border: none; border-radius: 6px;
      background: transparent; color: var(--text); font-size: 13px;
      font-family: inherit; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 8px; transition: background 0.15s;
    }
    .viz-menu-dropdown button:hover { background: var(--surface-hover); }

    /* ===== FOCUS ===== */
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

    /* ===== SLIDES ===== */
    .slides-wrapper {
      width: 1920px; height: 1080px;
      position: fixed; top: 0; left: 0;
      transform-origin: top left;
      overflow: hidden;
      background: var(--bg);
    }
    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
      padding: clamp(48px, 6vw, 80px) clamp(32px, 7vw, 112px);
      opacity: 0; transform: translateX(60px);
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .slide-header,
    .problem-grid,
    .feature-grid,
    .arch-flow,
    .why-section,
    .ba-grid,
    .reality-grid,
    .next-grid {
      width: min(100%, 1020px);
      margin-left: auto;
      margin-right: auto;
    }
    .slide.active {
      opacity: 1; transform: translateX(0); pointer-events: auto;
    }
    .slide.exit-left {
      opacity: 0; transform: translateX(-60px);
    }

    /* Progress bar */
    .progress-bar {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 9998;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      transition: width 0.4s ease;
    }

    /* Slide nav */
    .slide-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px; z-index: 9998;
    }
    .slide-nav button {
      width: 32px; height: 32px; border-radius: 8px;
      background: transparent; border: none; color: var(--text-secondary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0.35; transition: opacity 0.2s;
    }
    .slide-nav button:hover { opacity: 0.8; }
    .slide-counter {
      font-size: 12px; color: var(--text-secondary); font-weight: 400;
      min-width: 44px; text-align: center; opacity: 0.4;
      font-family: 'Inter', sans-serif;
    }

    /* ===== COMMON SLIDE ELEMENTS ===== */
    .slide-tag {
      font-size: calc(22px * var(--font-scale)); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 14px; font-family: 'Inter', sans-serif;
    }
    .slide-title {
      font-size: calc(64px * var(--font-scale)); font-weight: 700;
    }

    /* ===== SLIDE: COVER ===== */
    .slide-cover { text-align: center; justify-content: center; }
    .theme-dark .slide-cover { background: var(--bg); }
    .theme-light .slide-cover { background: var(--bg); }
    .cover-label {
      font-size: calc(18px * var(--font-scale)); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 28px;
    }
    .cover-title {
      font-size: calc(90px * var(--font-scale)); font-weight: 800; margin-bottom: 18px;
      line-height: 1.1;
    }
    .cover-desc {
      font-size: calc(30px * var(--font-scale)); color: var(--text-secondary);
      margin-bottom: 42px; max-width: 720px;
    }
    .cover-members {
      font-size: calc(20px * var(--font-scale)); color: var(--text-secondary); font-weight: 400;
    }
    .cover-members strong { color: var(--text-secondary); font-weight: 400; }

    /* ===== SLIDE: PROBLEM ===== */
    .theme-dark .slide-problem { background: var(--bg); }
    .theme-light .slide-problem { background: var(--bg); }
    .slide-problem { align-items: center; justify-content: center; }
    .slide-problem,
    .slide-built,
    .slide-how,
    .slide-ba,
    .slide-reality,
    .slide-next {
      justify-content: flex-start;
      padding-top: 160px;
    }
    .slide-problem .slide-header {
      margin-bottom: 48px; width: 100%;
    }
    .problem-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 28px; width: 100%;
    }
    .problem-left { display: flex; flex-direction: column; gap: 16px; }
    .problem-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 24px 24px;
      min-height: calc(150px * var(--font-scale));
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
      transition: box-shadow 0.2s ease;
    }
    .problem-card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 16px rgba(0,0,0,0.08); }
    .problem-card .num {
      font-size: 13px; font-weight: 700; color: var(--negative);
      margin-bottom: 4px; font-family: 'Inter', sans-serif;
    }
    .problem-card h3 { font-size: calc(36px * var(--font-scale)); font-weight: 700; margin-bottom: 8px; }
    .problem-card p { font-size: calc(28px * var(--font-scale)); color: var(--text-secondary); line-height: 1.55; white-space: pre-line; }

    .qa-process {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 28px 26px;
      min-height: 100%;
    }
    .qa-process h3 { font-size: calc(24px * var(--font-scale)); font-weight: 600; margin-bottom: 18px; color: var(--text-secondary); line-height: 1.5; }
    .qa-flow {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    }
    .qa-step {
      background: color-mix(in srgb, var(--accent), transparent 88%);
      color: var(--text); font-size: calc(24px * var(--font-scale)); font-weight: 500; line-height: 1.5;
      padding: 10px 18px; border-radius: 6px; white-space: nowrap;
    }
    .qa-arrow { color: var(--text-secondary); font-size: calc(20px * var(--font-scale)); }

    /* ===== SLIDE: WHAT WE BUILT ===== */
    .theme-dark .slide-built { background: linear-gradient(160deg, #1A1816 0%, #201E2E 100%); }
    .theme-light .slide-built { background: linear-gradient(160deg, #F5F2ED 0%, #E8EAF6 100%); }
    .slide-built { align-items: center; }
    .hero-quote {
      font-size: calc(64px * var(--font-scale)); font-weight: 700;
      margin-bottom: 12px; line-height: 1.3;
    }
    .hero-quote em { font-style: normal; color: var(--accent); }
    .hero-sub { font-size: calc(30px * var(--font-scale)); color: var(--text-secondary); margin-bottom: 52px; line-height: 1.5; }
    .feature-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%;
    }
    .feature-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 28px 24px;
      min-height: calc(280px * var(--font-scale));
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
      transition: box-shadow 0.2s ease;
    }
    .feature-card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 16px rgba(0,0,0,0.08); }
    .feature-icon {
      width: 48px; height: 48px; border-radius: 10px;
      background: color-mix(in srgb, var(--accent), transparent 85%);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    .feature-card h3 { font-size: calc(36px * var(--font-scale)); font-weight: 700; margin-bottom: 10px; }
    .feature-card p { font-size: calc(28px * var(--font-scale)); color: var(--text-secondary); line-height: 1.6; }

    /* ===== SLIDE: HOW WE BUILT ===== */
    .theme-dark .slide-how { background: var(--bg); }
    .theme-light .slide-how { background: var(--bg); }
    .slide-how { align-items: center; }
    .arch-flow {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 52px; width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 30px 30px;
    }
    .arch-node {
      background: color-mix(in srgb, var(--accent), transparent 82%);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 16px 24px; font-size: calc(28px * var(--font-scale)); font-weight: 600; line-height: 1.5;
      white-space: nowrap;
    }
    .arch-node.highlight {
      background: color-mix(in srgb, var(--accent), transparent 70%);
      border-color: color-mix(in srgb, var(--accent), transparent 50%);
      color: var(--accent);
    }
    .arch-arrow { color: var(--text-secondary); font-size: calc(24px * var(--font-scale)); font-weight: 500; }
    .why-section {
      width: 100%;
      background: color-mix(in srgb, var(--text-secondary), transparent 82%);
      border-radius: 10px; padding: 32px 30px;
    }
    .why-section h3 {
      font-size: calc(26px * var(--font-scale)); font-weight: 600; margin-bottom: 14px;
      color: var(--text-secondary); line-height: 1.5;
    }
    .why-list { display: flex; flex-direction: column; gap: 10px; }
    .why-item {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: calc(28px * var(--font-scale)); line-height: 1.6; color: var(--text-secondary);
    }
    .why-icon {
      flex-shrink: 0; width: 20px; height: 20px; margin-top: 2px;
      color: var(--text-secondary);
    }

    /* ===== SLIDE: BEFORE/AFTER ===== */
    .theme-dark .slide-ba { background: linear-gradient(160deg, #1A1816 0%, #2A2420 100%); }
    .theme-light .slide-ba { background: linear-gradient(160deg, #F5F2ED 0%, #EFE9DC 100%); }
    .slide-ba { align-items: center; }
    .slide-ba .slide-header,
    .slide-ba .ba-grid {
      width: min(100%, 1320px);
      margin-left: auto;
      margin-right: auto;
    }
    .ba-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 28px; width: 100%;
    }
    .ba-col {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 34px 30px;
      min-height: calc(320px * var(--font-scale));
    }
    .ba-label {
      font-size: calc(16px * var(--font-scale)); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 12px; font-family: 'Inter', sans-serif;
    }
    .ba-label.before { color: var(--negative); }
    .ba-label.after { color: var(--positive); }
    .ba-big {
      font-size: calc(80px * var(--font-scale)); font-weight: 700; line-height: 1;
      margin-bottom: 8px; font-family: 'Inter', sans-serif;
    }
    .ba-big.before-num { color: var(--negative); }
    .ba-big.after-num { color: var(--positive); }
    .ba-desc {
      font-size: calc(26px * var(--font-scale)); color: var(--text-secondary); margin-bottom: 24px;
    }
    .ba-list { display: flex; flex-direction: column; gap: 14px; }
    .ba-item {
      display: flex; align-items: center; gap: 10px;
      font-size: calc(28px * var(--font-scale)); color: var(--text);
    }
    .ba-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    }
    .ba-dot.neg { background: var(--negative); }
    .ba-dot.pos { background: var(--positive); }

    /* ===== SLIDE: REALITY CHECK ===== */
    .theme-dark .slide-reality { background: var(--bg); }
    .theme-light .slide-reality { background: var(--bg); }
    .slide-reality { align-items: center; }
    .reality-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 32px; width: 100%;
    }
    .reality-col h3 {
      font-size: calc(32px * var(--font-scale)); font-weight: 700; margin-bottom: 24px;
    }
    .reality-col h3.can { color: var(--positive); }
    .reality-col h3.cant { color: var(--text-secondary); }
    .reality-list { display: flex; flex-direction: column; gap: 18px; }
    .reality-item {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: calc(30px * var(--font-scale)); line-height: 1.55;
      background: var(--surface-hover); border: 1px solid var(--border);
      border-radius: 10px; padding: 30px 26px;
      min-height: calc(100px * var(--font-scale));
      box-shadow: 0 1px 12px rgba(0,0,0,0.25);
      transition: box-shadow 0.2s ease;
    }
    .reality-item:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 16px rgba(0,0,0,0.08); }
    .reality-icon { flex-shrink: 0; margin-top: 3px; }

    /* ===== SLIDE: WHAT'S NEXT ===== */
    .theme-dark .slide-next { background: linear-gradient(160deg, #1A1816 0%, #1E2035 100%); }
    .theme-light .slide-next { background: linear-gradient(160deg, #F5F2ED 0%, #E4E6F5 100%); }
    .slide-next { align-items: center; }
   .slide-next .slide-title { color: var(--text); }
    .next-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%;
      margin-bottom: 48px;
    }
    .next-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 30px 24px;
      min-height: calc(230px * var(--font-scale));

    /* ===== COMMON: compare (2단 비교) ===== */

    /* 상단 프로그레스 바 제거 */

      margin-top: 18px !important;
      padding: 12px 14px;
      background: color-mix(in srgb, var(--accent-secondary), transparent 88%);
      border-left: 2px solid var(--accent-secondary);
      border-radius: 4px;
      font-size: calc(18px * var(--font-scale)) !important;
      color: var(--text) !important;
    }

    /* Built: 그라디언트 제거, 플랫 bg */
    .theme-dark .slide-built { background: var(--bg) !important; }
    .theme-light .slide-built { background: var(--bg) !important; }
    .hero-quote { font-size: calc(52px * var(--font-scale)) !important; }
    .hero-quote em { color: var(--accent-secondary) !important; font-weight: 800; }
    .hero-sub { font-size: calc(24px * var(--font-scale)) !important; }

    /* Built steps variant: feature list 좌측 라인 */
    .built-step-item, .built-feature-step {
      border-left: 2px solid var(--border) !important;
      padding-left: 20px !important;
      transition: border-color 0.2s ease;
    }
    .built-step-item:hover, .built-feature-step:hover {
      border-left-color: var(--accent) !important;
    }

    /* Built compact: 왼쪽 55% 폭에 맞춰 타이포 축소 + iframe 데모 우측 */
    .built-step-item.compact {
      grid-template-columns: 56px 1fr !important;
      gap: 16px !important;
      padding: 14px 0 14px 18px !important;
      border-bottom: none !important;
    }
    .built-step-item.compact .built-step-num {
      font-size: calc(38px * var(--font-scale)) !important;
      color: var(--accent-secondary) !important;
      opacity: 0.5 !important;
    }
    .built-step-item.compact .built-step-text h3 {
      font-size: calc(28px * var(--font-scale)) !important;
      margin-bottom: 6px !important;
    }
    .built-step-item.compact .built-step-text p {
      font-size: calc(21px * var(--font-scale)) !important;
      line-height: 1.55 !important;
      white-space: pre-line !important;
    }
    .slide-built .hero-quote { font-size: calc(42px * var(--font-scale)) !important; line-height: 1.25 !important; }
    .slide-built .hero-sub { font-size: calc(20px * var(--font-scale)) !important; margin-bottom: 0 !important; }
    .built-demo-pane iframe { min-height: 100%; }

    /* BA bullet 정렬: 긴 텍스트에서 첫 줄과 맞춤 */
    .ba-item { align-items: flex-start !important; gap: 14px !important; }
    .ba-dot { margin-top: 13px !important; }
    .ba-list { gap: 18px !important; }

    /* BA: 그라디언트 제거, 숫자 크기 축소 */
    .theme-dark .slide-ba { background: var(--bg) !important; }
    .theme-light .slide-ba { background: var(--bg) !important; }
    .ba-big { font-size: calc(64px * var(--font-scale)) !important; font-weight: 800 !important; }
    .ba-label.before { color: var(--text-secondary) !important; }
    .ba-label.after { color: var(--accent) !important; }
    .ba-big.before-num { color: var(--text-secondary) !important; }
    .ba-big.after-num { color: var(--accent) !important; }

    /* Next: 그라디언트 제거 */
    .theme-dark .slide-next { background: var(--bg) !important; }
    .theme-light .slide-next { background: var(--bg) !important; }
    .next-roadmap-num { color: var(--accent-secondary) !important; opacity: 0.35 !important; }

    /* Closing: 강조 컬러 amber */
    .closing-main em { color: var(--accent-secondary) !important; }

    /* Q&A 타이틀 축소 */
    .qa-title { font-size: calc(96px * var(--font-scale)) !important; letter-spacing: -0.05em; }
    .theme-dark .slide-qa { background: var(--bg) !important; }
    .theme-light .slide-qa { background: var(--bg) !important; }

    /* Extra-cards 배경 플랫 */
    .theme-dark .slide-extra-cards { background: var(--bg) !important; }
    .theme-light .slide-extra-cards { background: var(--bg) !important; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link sr-only" onfocus="this.style.cssText='position:fixed;left:16px;top:16px;z-index:10000;padding:8px 16px;background:var(--accent);color:white;text-decoration:none;border-radius:4px;'" onblur="this.style.cssText='position:absolute;left:-9999px;'">Skip to content</a>

  <!-- MENU -->
  <div class="viz-menu">
    <button class="viz-menu-toggle" onclick="toggleMenu()" aria-label="메뉴">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>
    <div class="viz-menu-dropdown" id="vizMenuDropdown">
      <button onclick="toggleFullscreen()"><span id="fsIcon">⛶</span><span id="fsLabel">전체 화면</span></button>
      <button onclick="cycleTheme()"><span id="themeIcon">🌙</span><span id="themeLabel">Dark</span></button>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
        <button onclick="adjustFontScale(-0.1)" style="flex:1;">A−</button>
        <span id="fontScaleLabel" style="min-width:40px;text-align:center;font-size:13px;">100%</span>
        <button onclick="adjustFontScale(0.1)" style="flex:1;">A+</button>
      </div>
      <button onclick="downloadImage()"><span>📥</span><span>Download PNG</span></button>
      <button onclick="exportAllSlidesToPDF()"><span>🖨️</span><span>PDF 저장</span></button>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-bar" id="progressBar" style="width: 0%;" role="progressbar" aria-label="슬라이드 진행"></div>

  <main id="main-content" role="main">
    <div class="slides-wrapper" id="slidesWrapper">
      <!-- populated by renderSlides() -->
    </div>
  </main>

  <!-- SLIDE NAV -->
  <nav class="slide-nav" aria-label="슬라이드 네비게이션">
    <button onclick="prevSlide()" aria-label="이전 슬라이드">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="slide-counter" id="slideCounter" aria-live="polite">1 / 1</span>
    <button onclick="nextSlide()" aria-label="다음 슬라이드">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </nav>

  <!-- ✏️ 발표 내용은 slide-data.js 파일만 수정하세요. template.html은 건드리지 않아도 됩니다. -->
  <script src="slide-data.js"></script>
  <script>
    /* ============================================================
     * 아래 코드는 수정하지 마세요
     * ============================================================ */

    // SVG 아이콘 맵
    var ICONS = {
      grid: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>',
      bar:  '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10M6 20V4M18 20v-4"/></svg>',
      link: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
      check: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
      star:  '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      bolt:  '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
    };

    function getIcon(name) {
      return ICONS[name] || ICONS['grid'];
    }

    // HTML 이스케이프 헬퍼
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // extra 슬라이드 위치별 렌더링 헬퍼
    // ex.position: 'after-cover' | 'after-problem' | 'after-built' | 'after-how' | 'after-ba' | 'after-next' | 'before-closing'(기본)
    function renderExtraItems(pos, extras) {
      var result = '';
      (extras || []).forEach(function(ex, i) {
        var exPos = ex.position || 'before-closing';
        if (exPos !== pos) return;
        if (ex.type === 'image') {
          var imgStyle = ex.padding ? 'padding:' + ex.padding + ';' : '';
          result += '<section class="slide slide-image-only" data-type="extra-image" aria-label="추가 슬라이드">'
            + (imgStyle ? '<div style="' + imgStyle + 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;">'
              + '<img src="' + esc(ex.src) + '" alt="' + esc(ex.alt || '') + '" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:10px;">'
              + '</div>'
              : '<img src="' + esc(ex.src) + '" alt="' + esc(ex.alt || '') + '">')
            + '</section>';
        } else if (ex.type === 'cards') {
          var extraCards = (ex.items || []).map(function(item, ci) {
            return '<div class="extra-card animate delay-' + (ci + 3) + '">'
              + '<h3>' + esc(item.heading) + '</h3>'
              + '<p>' + esc(item.body) + '</p>'
              + '</div>';
          }).join('');
          result += '<section class="slide slide-extra-cards" data-type="extra-cards" aria-label="추가 슬라이드">'
            + '<div style="width:100%;margin-bottom:130px;">'
            + '<p class="slide-tag animate">' + esc(ex.tag || 'Extra') + '</p>'
            + '<h2 class="slide-title animate delay-1">' + esc(ex.title || '') + '</h2>'
            + '</div>'
            + '<div class="extra-cards-grid">' + extraCards + '</div>'
            + '</section>';
        }
      });
      return result;
    }

    // 슬라이드 렌더링
    function renderSlides() {
      var wrapper = document.getElementById('slidesWrapper');
      var html = '';
      var d = SLIDE_DATA;

      // ── Accent 색상 적용 ───────────────────────────────────────
      if (d.meta.accentColor) {
        document.documentElement.style.setProperty('--accent', d.meta.accentColor);
      }
      if (d.meta.accentSecondary) {
        document.documentElement.style.setProperty('--accent-secondary', d.meta.accentSecondary);
      }


      // ── 1. Cover ──────────────────────────────────────────────
      var memberParts = esc(d.cover.members).split(',').map(function(m) {
        var t = m.trim();
        if (t.charAt(t.length - 1) === '*') {
          return '<strong>' + t.slice(0, -1) + '*</strong>';
        }
        return t;
      });

      var coverImageHtml = d.cover.image
        ? '<div class="cover-image-wrap"><img src="' + esc(d.cover.image) + '" alt="' + esc(d.cover.imageAlt || '') + '" /></div>'
        : '';
      html += '<section class="slide slide-cover ' + (d.cover.image ? 'has-image' : '') + '" data-type="cover" aria-label="표지">'
        + '<div class="cover-text">'
        + '<p class="cover-label animate">' + esc(d.meta.session) + '</p>'
        + '<h1 class="cover-title animate delay-1">' + esc(d.cover.title) + '</h1>'
        + '<p class="cover-desc animate delay-2">' + esc(d.cover.subtitle) + '</p>'
        + '<p class="cover-members animate delay-3">' + memberParts.join(', ') + '</p>'
        + '</div>'
        + coverImageHtml
        + '</section>';
      html += renderExtraItems('after-cover', d.extra);

      // ── 2. Problem ────────────────────────────────────────────
      if (d.problem.variant === 'timeline') {
        var timelineItems = d.problem.cards.map(function(c, i) {
          return '<div class="problem-timeline-item animate delay-' + (i + 2) + '">'
            + '<div class="problem-timeline-dot">' + esc(c.num) + '</div>'
            + '<div class="problem-timeline-content">'
            + '<h3>' + esc(c.heading) + '</h3>'
            + '<p>' + esc(c.body) + '</p>'
            + '</div></div>';
        }).join('');
        html += '<section class="slide slide-problem" data-type="problem" aria-label="The Problem">'
          + '<div class="slide-header" style="margin-bottom:68px;width:100%;">'
          + '<p class="slide-tag animate">The Problem</p>'
          + '<h2 class="slide-title animate delay-1">' + esc(d.problem.title) + '</h2>'
          + '</div>'
          + '<div class="problem-timeline-wrap">' + timelineItems + '</div>'
          + '</section>';
      } else if (d.problem.variant === 'single') {
        var singlePoints = d.problem.cards.map(function(c, i) {
          return '<div class="problem-single-point animate delay-' + (i + 3) + '">'
            + '<h3>' + esc(c.heading) + '</h3>'
            + '<p>' + esc(c.body) + '</p></div>';
        }).join('');
        var singleTitle = esc(d.problem.title);
        if (d.problem.highlight) {
          singleTitle = singleTitle.replace(esc(d.problem.highlight), '<em>' + esc(d.problem.highlight) + '</em>');
        }
        html += '<section class="slide slide-problem" data-type="problem" aria-label="The Problem">'
          + '<div class="problem-single-wrap">'
          + '<div class="slide-header" style="margin-bottom:68px;width:100%;">'
          + '<p class="slide-tag animate">The Problem</p>'
          + '<h2 class="slide-title animate delay-1">' + esc(d.problem.title) + '</h2>'
          + '</div>'
          + '<div class="problem-single-points">' + singlePoints + '</div>'
          + '</div></section>';
      } else if (d.problem.variant === 'focus') {
        // focus variant: 타이틀 + 설명 + 3카드 박스
        var focusCards = d.problem.cards.map(function(c, i) {
          return '<div class="problem-focus-card animate delay-' + (i + 3) + '">'
            + '<p class="num">' + esc(c.num) + '</p>'
            + '<h3>' + esc(c.heading) + '</h3>'
            + '<p>' + esc(c.body) + '</p></div>';
        }).join('');
        var focusDesc = d.problem.focus && d.problem.focus.desc ? d.problem.focus.desc : '';
        html += '<section class="slide slide-problem" data-type="problem" aria-label="The Problem">'
          + '<div class="problem-focus-wrap">'
          + '<div class="slide-header" style="margin-bottom:20px;width:100%;">'
          + '<p class="slide-tag animate">The Problem</p>'
          + '<h2 class="slide-title animate delay-1">' + esc(d.problem.title) + '</h2>'
          + '</div>'
          + (focusDesc ? '<p class="problem-focus-desc animate delay-2">' + esc(focusDesc) + '</p>' : '')
          + '<div class="problem-focus-cards">' + focusCards + '</div>'
          + '</div></section>';
      } else {
        // split variant (기본): 3카드 + 프로세스 플로우
        var problemCards = d.problem.cards.map(function(c, i) {
          return '<div class="problem-card animate delay-' + (i + 2) + '">'
            + '<p class="num">' + esc(c.num) + '</p>'
            + '<h3>' + esc(c.heading) + '</h3>'
            + '<p>' + esc(c.body) + '</p>'
            + '</div>';
        }).join('');
        var processHtml = '';
        if (d.problem.process) {
          var stepsHtml = d.problem.process.steps.map(function(s, i) {
            return (i > 0 ? '<span class="qa-arrow">→</span>' : '')
              + '<span class="qa-step">' + esc(s) + '</span>';
          }).join('');
          var noteHtml = d.problem.process.note
            ? '<p style="margin-top:20px;font-size:17px;color:var(--text-secondary);">' + esc(d.problem.process.note) + '</p>'
            : '';
          processHtml = '<div class="qa-process animate delay-' + (d.problem.cards.length + 2) + '">'
            + '<h3>' + esc(d.problem.process.title) + '</h3>'
            + '<div class="qa-flow">' + stepsHtml + '</div>'
            + noteHtml
            + '</div>';
        }
        html += '<section class="slide slide-problem" data-type="problem" aria-label="The Problem">'
          + '<div class="slide-header" style="margin-bottom:68px;width:100%;">'
          + '<p class="slide-tag animate">The Problem</p>'
          + '<h2 class="slide-title animate delay-1">' + esc(d.problem.title) + '</h2>'
          + '</div>'
          + '<div class="problem-grid">'
          + '<div class="problem-left">' + problemCards + '</div>'
          + processHtml
          + '</div>'
          + '</section>';
      }
      html += renderExtraItems('after-problem', d.extra);

      // ── 3. What We Built ──────────────────────────────────────
      if (false && d.built.variant === 'steps' && d.built.features.length <= 3) {
        // 3개 이하: 기존 세로 레이아웃
        var stepsHtml = d.built.features.map(function(f, i) {
          var num = String(i + 1).padStart(2, '0');
          return '<div class="built-step-item animate delay-' + (i + 3) + '">'
            + '<p class="built-step-num">' + num + '</p>'
            + '<div class="built-step-content">'
            + '<div class="feature-icon">' + getIcon(f.icon) + '</div>'
            + '<div class="built-step-text">'
            + '<h3>' + esc(f.heading) + '</h3>'
            + '<p>' + esc(f.body) + '</p>'
            + '</div></div></div>';
        }).join('');
        html += '<section class="slide slide-built" data-type="built" aria-label="What We Built" style="align-items:flex-start;">'
          + '<div style="width:100%;">'
          + '<div class="slide-header" style="margin-bottom:36px;width:100%;">'
          + '<p class="slide-tag animate">What We Built</p>'
          + '<h2 class="hero-quote animate delay-1">' + esc(d.built.quote) + '<br><em>' + esc(d.built.quoteHighlight) + '</em></h2>'
          + '<p class="hero-sub animate delay-2">' + esc(d.built.sub) + '</p>'
          + '</div>'
          + '<div class="built-steps-wrap">' + stepsHtml + '</div>'
          + '</div>'
          + '</section>';
      } else if (d.built.variant === 'steps') {
        // 4개 이상: 좌(타이틀+스텝 세로 스택) + 우(라이브 데모 iframe)
        var stepsHtml = d.built.features.map(function(f, i) {
          var num = String(i + 1).padStart(2, '0');
          return '<div class="built-step-item compact animate delay-' + (i + 3) + '">'
            + '<p class="built-step-num">' + num + '</p>'
            + '<div class="built-step-content">'
            + '<div class="built-step-text">'
            + '<h3>' + esc(f.heading) + '</h3>'
            + '<p>' + esc(f.body).replace(/\n/g, '<br>') + '</p>'
            + '</div></div></div>';
        }).join('');
        var builtQuoteHtml = esc(d.built.quote).replace(/\n/g, '<br>');
        var demoUrl = d.built.demoUrl || '/?demo=1';
        html += '<section class="slide slide-built" data-type="built" aria-label="What We Built" style="flex-direction:row;gap:40px;align-items:stretch;">'
          + '<div style="width:55%;display:flex;flex-direction:column;gap:28px;flex-shrink:0;">'
          + '<div>'
          + '<p class="slide-tag animate">What We Built</p>'
          + '<h2 class="hero-quote animate delay-1">' + builtQuoteHtml + (d.built.quoteHighlight ? '<br><em>' + esc(d.built.quoteHighlight) + '</em>' : '') + '</h2>'
          + (d.built.sub ? '<p class="hero-sub animate delay-2">' + esc(d.built.sub) + '</p>' : '')
          + '</div>'
          + '<div class="built-steps-wrap" style="display:flex;flex-direction:column;gap:14px;">' + stepsHtml + '</div>'
          + '</div>'
          + '<div class="built-demo-pane animate delay-2" style="flex:1;display:flex;align-items:center;justify-content:center;background:transparent;overflow:hidden;position:relative;">'
          + '<iframe src="' + esc(demoUrl) + '" title="Live Demo" loading="lazy" style="width:100%;height:100%;border:0;outline:none;display:block;background:transparent;" allow="clipboard-write"></iframe>'
          + '</div>'
          + '</section>';
      } else {
        var featuresHtml = d.built.features.map(function(f, i) {
          return '<div class="feature-card animate delay-' + (i + 3) + '">'
            + '<div class="feature-icon">' + getIcon(f.icon) + '</div>'
            + '<h3>' + esc(f.heading) + '</h3>'
            + '<p>' + esc(f.body) + '</p>'
            + '</div>';
        }).join('');
        html += '<section class="slide slide-built" data-type="built" aria-label="What We Built">'
          + '<div class="slide-header" style="margin-bottom:68px;width:100%;">'
          + '<p class="slide-tag animate">What We Built</p>'
          + '<h2 class="hero-quote animate delay-1">' + esc(d.built.quote) + '<br><em>' + esc(d.built.quoteHighlight) + '</em></h2>'
          + '<p class="hero-sub animate delay-2">' + esc(d.built.sub) + '</p>'
          + '</div>'
          + '<div class="feature-grid">' + featuresHtml + '</div>'
          + '</section>';
      }

      // ── 8. Extra slides (before-closing, 위치 미지정 항목) ────
      (d.extra || []).forEach(function(ex, i) {
        var exPos = ex.position || 'before-closing';
        if (exPos !== 'before-closing') return;
        if (ex.type === 'image') {
          html += '<section class="slide slide-image-only" data-type="extra-image" aria-label="추가 슬라이드 ' + (i + 1) + '">'
            + '<img src="' + esc(ex.src) + '" alt="' + esc(ex.alt || '') + '">'
            + '</section>';
        } else if (ex.type === 'cards') {
          var extraCards = (ex.items || []).map(function(item, ci) {
            return '<div class="extra-card animate delay-' + (ci + 3) + '">'
              + '<h3>' + esc(item.heading) + '</h3>'
              + '<p>' + esc(item.body) + '</p>'
              + '</div>';
          }).join('');
          html += '<section class="slide slide-extra-cards" data-type="extra-cards" aria-label="추가 슬라이드 ' + (i + 1) + '">'
            + '<div style="width:100%;margin-bottom:130px;">'
            + '<p class="slide-tag animate">' + esc(ex.tag || 'Extra') + '</p>'
            + '<h2 class="slide-title animate delay-1">' + esc(ex.title || '') + '</h2>'
            + '</div>'
            + '<div class="extra-cards-grid">' + extraCards + '</div>'

    // 슬라이드 시스템 초기화
    function initSlides() {
      var slides = document.querySelectorAll('.slide');
      var totalSlides = slides.length;
      var currentSlide = 0;

      // BA 슬라이드 인덱스를 동적으로 탐색
      var baSlideIndex = Array.from(slides).findIndex(function(s) {
        return s.classList.contains('slide-ba');
      });

      function syncOuterBackground(index) {
        if (!slides || !slides.length) return;
        var activeSlide = slides[index];
        if (!activeSlide) return;
        var styles = window.getComputedStyle(activeSlide);
        document.body.style.backgroundColor = styles.backgroundColor;
        document.body.style.backgroundImage = styles.backgroundImage === 'none' ? 'none' : styles.backgroundImage;
      }

      function showSlide(index) {
        slides.forEach(function(slide, i) {
          slide.classList.remove('active', 'exit-left');
          if (i < index) slide.classList.add('exit-left');
        });
        slides[index].classList.add('active');
        currentSlide = index;
        syncOuterBackground(index);
        document.getElementById('slideCounter').textContent = (index + 1) + ' / ' + totalSlides;
        document.getElementById('progressBar').style.width = ((index + 1) / totalSlides * 100) + '%';

        // 현재 슬라이드 애니메이션 재트리거
        var animEls = slides[index].querySelectorAll('.animate');
        animEls.forEach(function(el) {
          el.style.animation = 'none';
          el.offsetHeight; // reflow 강제
          el.style.animation = '';
        });

        // BA 슬라이드 도달 시 숫자 카운터 트리거
        if (index === baSlideIndex) {
          setTimeout(animateCounters, 300);
        }
      }

      window.nextSlide = function() { if (currentSlide < totalSlides - 1) showSlide(currentSlide + 1); };
      window.prevSlide = function() { if (currentSlide > 0) showSlide(currentSlide - 1); };

      // 키보드 네비게이션
      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); window.nextSlide(); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); window.prevSlide(); }
      });

      // 터치 네비게이션
      var touchStartX = 0;
      document.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; });
      document.addEventListener('touchend', function(e) {
        var diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) { diff > 0 ? window.nextSlide() : window.prevSlide(); }
      });

      // 클릭 네비게이션 (왼쪽 1/3 = 이전, 오른쪽 2/3 = 다음)
      document.getElementById('slidesWrapper').addEventListener('click', function(e) {
        if (e.target.closest('.viz-menu') || e.target.closest('.slide-nav') || e.target.closest('button') || e.target.closest('a')) return;
        var x = e.clientX / window.innerWidth;
        if (x < 0.33) window.prevSlide(); else window.nextSlide();
      });

      // 테마 변경 시 배경 동기화
      window.onThemeChange = function() { syncOuterBackground(currentSlide); };

      // 초기 슬라이드 표시
      showSlide(0);
    }

    // 숫자 카운터 애니메이션
    function animateCounters() {
      // 숫자 카운트업 애니메이션 비활성화 — 최종값 즉시 표시
      document.querySelectorAll('[data-count]').forEach(function(el) {
        if (el.dataset.counted) return;
        el.dataset.counted = '1';
        var target = parseFloat(el.dataset.count);
        var suffix = el.dataset.suffix || '';
        var prefix = el.dataset.prefix || '';
        el.textContent = prefix + target + suffix;
      });
    }

    // PNG 다운로드
    async function downloadImage() {
      var menu = document.querySelector('.viz-menu');
      var nav = document.querySelector('.slide-nav');
      menu.style.display = 'none';
      nav.style.display = 'none';
      try {
        var activeSlide = document.querySelector('.slide.active');
        var url = await htmlToImage.toPng(activeSlide, { quality: 1, pixelRatio: 2 });
        var a = document.createElement('a');
        a.href = url;
        a.download = 'slide-' + (document.querySelectorAll('.slide.exit-left').length + 1) + '.png';
        a.click();
      } catch(e) { console.error('Download failed:', e); }
      menu.style.display = '';
      nav.style.display = '';
    }

    // === 메뉴 ===
    function toggleMenu() {
      var dropdown = document.getElementById('vizMenuDropdown');
      if (dropdown) dropdown.classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.viz-menu')) {
        var dropdown = document.getElementById('vizMenuDropdown');
        if (dropdown) dropdown.classList.remove('open');
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var dropdown = document.getElementById('vizMenuDropdown');
        if (dropdown) dropdown.classList.remove('open');
      }
    });

    // === 폰트 크기 조절 ===
    var currentFontScale = parseFloat(localStorage.getItem('font-scale') || '1');
    (function initFontScale() {
      document.documentElement.style.setProperty('--font-scale', currentFontScale);
      var lbl = document.getElementById('fontScaleLabel');
      if (lbl) lbl.textContent = Math.round(currentFontScale * 100) + '%';
    })();

    function adjustFontScale(delta) {
      currentFontScale = Math.max(0.7, Math.min(1.5, +(currentFontScale + delta).toFixed(1)));
      document.documentElement.style.setProperty('--font-scale', currentFontScale);
      var lbl = document.getElementById('fontScaleLabel');
      if (lbl) lbl.textContent = Math.round(currentFontScale * 100) + '%';
      localStorage.setItem('font-scale', currentFontScale);
    }

    // === 테마 ===
    var savedTheme = localStorage.getItem('viz-theme');
    var currentTheme = savedTheme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    function applyTheme(t) {
      document.documentElement.className = 'theme-' + t;
      document.getElementById('themeIcon').textContent = t === 'dark' ? '🌙' : '☀️';
      document.getElementById('themeLabel').textContent = t === 'dark' ? 'Dark' : 'Light';
      localStorage.setItem('viz-theme', t);
      currentTheme = t;
      if (typeof window.onThemeChange === 'function') window.onThemeChange();
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    applyTheme(currentTheme);

    // === 전체 화면 ===
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fsIcon').textContent = '✕';
        document.getElementById('fsLabel').textContent = '전체 화면 종료';
      } else {
        document.exitFullscreen();
        document.getElementById('fsIcon').textContent = '⛶';
        document.getElementById('fsLabel').textContent = '전체 화면';
      }
    }
    document.addEventListener('fullscreenchange', function() {
      if (!document.fullscreenElement) {
        document.getElementById('fsIcon').textContent = '⛶';
        document.getElementById('fsLabel').textContent = '전체 화면';
      }
    });

    // === 뷰포트 스케일 ===
    function scaleSlides() {
      var wrapper = document.getElementById('slidesWrapper');
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var scale = Math.min(vw / 1920, vh / 1080);
      var offsetX = (vw - 1920 * scale) / 2;
      var offsetY = (vh - 1080 * scale) / 2;
      wrapper.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
    }
    window.addEventListener('resize', scaleSlides);
    scaleSlides();

    // === 실행 ===
    renderSlides();
    initSlides();

    // === PDF 전체 슬라이드 저장 (순수 CSS, 외부 라이브러리 없음) ===
    function exportAllSlidesToPDF() {
      var slides = document.querySelectorAll('.slide');
      var origTheme = document.documentElement.className;
      var activeIndex = Array.from(slides).findIndex(function(s) { return s.classList.contains('active'); });

      // 1) 현재 테마 유지, pdf-mode 활성화
      document.body.classList.add('pdf-mode');

      // 2) 페이지 번호 삽입
      var total = slides.length;
      slides.forEach(function(s, i) {
        var num = document.createElement('div');
        num.className = 'pdf-page-number';
        num.textContent = (i + 1) + ' / ' + total;
        s.appendChild(num);
      });

      // 3) 모든 슬라이드 표시
      slides.forEach(function(s) {
        s.style.opacity = '1';
        s.style.transform = 'none';
        s.classList.add('active');
        s.classList.remove('exit-left');
        s.querySelectorAll('.animate').forEach(function(el) {
          el.style.animation = 'none';
          el.style.opacity = '1';
          el.style.transform = 'none';
        });
      });

      // 4) 인쇄 후 복원
      function restore() {
        document.body.classList.remove('pdf-mode');
        document.documentElement.className = origTheme;
        slides.forEach(function(s) {
          s.style.opacity = '';
          s.style.transform = '';
          s.classList.remove('active');
          s.querySelectorAll('.animate').forEach(function(el) {
            el.style.animation = '';
            el.style.opacity = '';
            el.style.transform = '';
          });
        });
        if (activeIndex >= 0) {
          for (var j = 0; j < activeIndex; j++) slides[j].classList.add('exit-left');
          slides[activeIndex].classList.add('active');
        }
        // 페이지 번호 제거
        document.querySelectorAll('.pdf-page-number').forEach(function(el) { el.remove(); });
        scaleSlides();
        window.removeEventListener('afterprint', restore);
      }
      window.addEventListener('afterprint', restore);

      // 5) 약간 대기 후 인쇄
      setTimeout(function() { window.print(); }, 300);
    }
  </script>
</body>
</html>
